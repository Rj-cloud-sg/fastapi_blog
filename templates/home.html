{% extends "layout.html" %}  <!-- extends layout.html, which means that this template will inherit the layout defined in layout.html -->
{% block content %}  <!-- block content is a placeholder for content that will be defined in child templates -->
        {% for post in posts %}   <!-- for loop loops over posts, passed in line 31 -->
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
        {% endfor %}
        {% endblock content %}
